<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Contato</title>

    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="cabecalho">
    <nav class="menu">
        <div class="menu-container">
            <div class="logo">
                <img src="img/apple-logo.png" alt="Apple">
            </div>
            <ul class="menu-links">
                <li><a href="#">Store</a></li>
                <li><a href="#">Mac</a></li>
                <li><a href="#">iPad</a></li>
                <li><a href="#">iPhone</a></li>
                <li><a href="#">Watch</a></li>
                <li><a href="#">AirPods</a></li>
                <li><a href="#">TV & Home</a></li>
                <li><a href="#">Support</a></li>
            </ul>
        </div>
    </nav>
</header>

<section class="topo">
    <div class="topo-conteudo">
        <div class="topo-logo">
            <img src="img/apple-logo.png" alt="Apple">
        </div>
        <h1>Apple Contato</h1>
        <p>Precisa de ajuda? Fale com a gente.</p>
    </div>
</section>

<main>

<section class="formulario">
    <div class="form-card">
        <h2>Fale conosco</h2>
        <form id="form-contato">
            <input type="text" id="nome" placeholder="Nome" required>
            <input type="email" id="email" placeholder="Email" required>
            <textarea id="mensagem" placeholder="Mensagem" required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>
</section>

<section class="redes">
    <h2 class="titulo-secao">Redes sociais</h2>

    <div class="redes-grid">
        <a class="rede-card" href="https://www.linkedin.com/company/apple" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
            <span>LinkedIn</span>
        </a>

        <a class="rede-card" href="https://www.instagram.com/apple" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
            <span>Instagram</span>
        </a>

        <a class="rede-card" href="https://x.com/apple" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png">
            <span>X</span>
        </a>

        <a class="rede-card" href="https://www.youtube.com/apple" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
            <span>YouTube</span>
        </a>
    </div>
</section>

</main>

<footer class="rodape">
    <div class="rodape-container">
        <p>Site Empresarial - Apple</p>
        <p>Desenvolvimento Web</p>
        <div class="rodape-links">
            <a href="https://www.uva.br/" target="_blank">Veiga de Almeida</a>
        </div>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
